# Frontend Changes
frontend:
  - changed-files:
      - any-glob-to-any-file:
          - "src/app/**"
          - "src/components/**"
          - "src/features/**"
          - "src/hooks/**"
          - "src/styles/**"
          - "public/**"
          - "types/**"

# Backend & Database Changes (Supabase)
backend:
  - changed-files:
      - any-glob-to-any-file:
          - "src/app/api/**"
          - "src/lib/**"
          - "src/utils/**"
          - "supabase/**"
          - "src/actions/**"

# Configuration & Dependencies
configuration:
  - changed-files:
      - any-glob-to-any-file:
          - "package.json"
          - "pnpm-lock.yaml"
          - "package-lock.json"
          - "next.config.*"
          - "tsconfig.json"
          - "tailwind.config.*"
          - ".env*"
          - "postcss.config.*"

# Documentation
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*.md"
          - "docs/**"

# CI/CD & Workflows
ci-cd:
  - changed-files:
      - any-glob-to-any-file:
          - ".github/**"
